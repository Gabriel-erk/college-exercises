<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listagem Api Game Of Thrones</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-primary text-white">
    <header>
        <nav class="navbar navbar-expand-lg bg-secondary navbar-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="#"><img src="img/got-logo.png" alt="" id="logo"></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavDropdown">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="sobre-api.html">Sobre Api</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-4">
        <section id="detalhes-sec" class="d-flex flex-column flex-md-row gap-md-4">
            <img id="imagem-carinha" class="rounded  img-fluid">

            <div id="descricao">
                <h1 id="nome-personagem" class="fw-bold mt-4 mb-3"></h1>
                <div class="info-personagem p-3 rounded-4 mb-3">
                    <h6 class="fw-bold">Descrição</h6>
                    <p id="descricao-personagem"></p>
                </div>

                <div class="info-personagem p-3 rounded-4">
                    <h6 class="fw-bold">Detalhes</h6>
                    <div class="d-flex flex-column flex-md-row justify-content-between py-2 px-3 px-md-5 gap-3">
                        <div class="detalhe">
                            <h6>Nome:</h6>
                            <span id="det-nome" class="fw-bold"> </span>
                        </div>

                        <div class="detalhe">
                            <h6>Título:</h6>
                            <span id="det-titulo" class="fw-bold"></span>
                        </div>

                        <div class="detalhe">
                            <h6>Família:</h6>
                            <span id="det-familia" class="fw-bold"></span>
                        </div>
                    </div>
                </div>
                <a class="btn btn-secondary fw-bold fs-4 w-100 my-4" href="index.html">Voltar</a>
            </div>

        </section>
    </main>
    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="detalhes.js"></script>
</body>

</html>
